<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library Visitor Log App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>NEU Library Visitor Log App</h1>
    </header>
    <main>
        <section id="login">
            <h2>Login</h2>
            <form id="rfid-login">
                <label for="rfid">RFID Login:</label>
                <input type="text" id="rfid" name="rfid" required>
                <button type="submit">Login</button>
            </form>
            <form id="email-login">
                <label for="email">Email Login:</label>
                <input type="email" id="email" name="email" required>
                <button type="submit">Login</button>
            </form>
        </section>
        <section id="visitor-entry">
            <h2>Visitor Entry</h2>
            <form id="entry-form">
                <label for="visitor-name">Visitor Name:</label>
                <input type="text" id="visitor-name" name="visitor-name" required>
                <label for="purpose">Purpose of Visit:</label>
                <select id="purpose" name="purpose">
                    <option value="study">Study</option>
                    <option value="meeting">Meeting</option>
                    <option value="event">Event</option>
                </select>
                <button type="submit">Submit</button>
            </form>
        </section>
        <section id="admin-dashboard">
            <h2>Admin Dashboard</h2>
            <div id="statistics">
                <h3>Statistics</h3>
                <p>Total Visitors: <span id="total-visitors">0</span></p>
                <p>Total Check-ins: <span id="total-checkins">0</span></p>
            </div>
            <button id="export-pdf">Export to PDF</button>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
